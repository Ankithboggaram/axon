name: CI

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.85"

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        # protobuf-compiler: protoc, needed by axon's and cortex-contract's build.rs.
        # libcurl4-openssl-dev: the runner has a partial libcurl present (runtime
        # lib, no headers), which makes librdkafka's cmake build auto-detect curl
        # support and then fail on a missing curl/curl.h despite -DWITH_CURL=0.
        # Installing the headers makes the auto-detected build actually succeed.
        # `apt-get update` first: the runner image's pre-baked package index
        # points at a libcurl4-openssl-dev build that 404s on the live mirror.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        # protobuf-compiler: protoc, needed by axon's and cortex-contract's build.rs.
        # libcurl4-openssl-dev: the runner has a partial libcurl present (runtime
        # lib, no headers), which makes librdkafka's cmake build auto-detect curl
        # support and then fail on a missing curl/curl.h despite -DWITH_CURL=0.
        # Installing the headers makes the auto-detected build actually succeed.
        # `apt-get update` first: the runner image's pre-baked package index
        # points at a libcurl4-openssl-dev build that 404s on the live mirror.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run tests
        run: cargo test --all-targets

  test-msrv:
    name: Test (MSRV 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        # protobuf-compiler: protoc, needed by axon's and cortex-contract's build.rs.
        # libcurl4-openssl-dev: the runner has a partial libcurl present (runtime
        # lib, no headers), which makes librdkafka's cmake build auto-detect curl
        # support and then fail on a missing curl/curl.h despite -DWITH_CURL=0.
        # Installing the headers makes the auto-detected build actually succeed.
        # `apt-get update` first: the runner image's pre-baked package index
        # points at a libcurl4-openssl-dev build that 404s on the live mirror.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run tests
        run: cargo test --all-targets

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        # protobuf-compiler: protoc, needed by axon's and cortex-contract's build.rs.
        # libcurl4-openssl-dev: the runner has a partial libcurl present (runtime
        # lib, no headers), which makes librdkafka's cmake build auto-detect curl
        # support and then fail on a missing curl/curl.h despite -DWITH_CURL=0.
        # Installing the headers makes the auto-detected build actually succeed.
        # `apt-get update` first: the runner image's pre-baked package index
        # points at a libcurl4-openssl-dev build that 404s on the live mirror.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  bench:
    name: Benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        # protobuf-compiler: protoc, needed by axon's and cortex-contract's build.rs.
        # libcurl4-openssl-dev: the runner has a partial libcurl present (runtime
        # lib, no headers), which makes librdkafka's cmake build auto-detect curl
        # support and then fail on a missing curl/curl.h despite -DWITH_CURL=0.
        # Installing the headers makes the auto-detected build actually succeed.
        # `apt-get update` first: the runner image's pre-baked package index
        # points at a libcurl4-openssl-dev build that 404s on the live mirror.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Compile benchmarks
        run: cargo bench --no-run --profile dev
