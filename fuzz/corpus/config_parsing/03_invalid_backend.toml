[grpc]
host = "0.0.0.0"
port = 50051
stream_poll_interval_ms = 100
request_timeout_ms = 5000

[backend]
type = "onnxruntime"

[registry]
type = "mlflow"
uri = "http://localhost:5000"
model_name = "model"
model_version = "1"

[store]
type = "redis"
host = "localhost"
port = 6379

[metrics]
port = 9090

[[model_schema.inputs]]
name = "features"
dtype = "float32"
shape = [1, 32]

[[model_schema.outputs]]
name = "score"
dtype = "float32"
shape = [1, 1]

[[pipeline.stages]]
type = "infer"
