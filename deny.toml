[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
ignore = [
    # protobuf v2.28.0 (transitive via prometheus) has a stack overflow when
    # *parsing* untrusted input. prometheus only generates protobuf output and
    # never parses incoming protobuf, so this is not exploitable in axon.
    { id = "RUSTSEC-2024-0437" },
]
