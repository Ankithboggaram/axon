[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "BSL-1.0",              # Boost Software License; permissive
    "CDLA-Permissive-2.0",  # webpki-root-certs; permissive data license
    "Unlicense",
]

exceptions = [
    # r-efi provides UEFI interface bindings. It is only compiled on UEFI
    # targets and is not included in Linux/macOS server builds.
    { name = "r-efi", allow = ["LGPL-2.1-or-later"] },
]

[bans]
# Warn on duplicate crate versions rather than hard-failing; some version
# skew (e.g. hashbrown 0.12/0.17, thiserror 1/2) is unavoidable while
# transitive dependencies catch up.
multiple-versions = "warn"
wildcards = "deny"

[advisories]
# "all" checks every crate in the dependency tree.
unmaintained = "all"
yanked = "deny"
ignore = [
    # RUSTSEC-2024-0437: protobuf 2.28.0 (via prometheus 0.13.4) has an
    # uncontrolled-recursion bug when parsing externally-supplied messages.
    # prometheus uses protobuf only for metrics text rendering, not for parsing
    # external input, so the risk is minimal. Cannot fix without prometheus
    # upgrading its protobuf dependency upstream.
    { id = "RUSTSEC-2024-0437" },
]

